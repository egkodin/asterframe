name: Bug report
description: Report incorrect behavior in a command, detector, hook, tool, or live workflow.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and the affected command or script.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest reliable sequence of steps.
      placeholder: |
        1. Install Asterframe at ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Agent harness, OS, Node version, Python version"
  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or example project
